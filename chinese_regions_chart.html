Chart.register(ChartDataLabels);

const ALL_MONTHS = ['25-03','25-04','25-05','25-06','25-07','25-08','25-09','25-10','25-11','25-12','26-01','26-02','26-03'];
const MONTH_LABELS = {
  '25-03':'2025.03','25-04':'2025.04','25-05':'2025.05','25-06':'2025.06',
  '25-07':'2025.07','25-08':'2025.08','25-09':'2025.09','25-10':'2025.10',
  '25-11':'2025.11','25-12':'2025.12','26-01':'2026.01','26-02':'2026.02','26-03':'2026.03'
};

// 분기 매핑 (월 → 분기 키)
const QUARTER_OF = {
  '25-03':'25-Q1','25-04':'25-Q2','25-05':'25-Q2','25-06':'25-Q2',
  '25-07':'25-Q3','25-08':'25-Q3','25-09':'25-Q3','25-10':'25-Q4',
  '25-11':'25-Q4','25-12':'25-Q4','26-01':'26-Q1','26-02':'26-Q1','26-03':'26-Q1'
};

// 필터 상태
let filterStart = ALL_MONTHS[0];
let filterEnd   = ALL_MONTHS[ALL_MONTHS.length - 1];
let filterBy    = 'month'; // 'month' | 'quarter'

// 차트 인스턴스 저장 (id → Chart)
const chartInstances = {};

// ── 필터 적용 후 사용할 labels / 인덱스 계산 ──────────────────
function getFilteredSlice() {
  const si = ALL_MONTHS.indexOf(filterStart);
  const ei = ALL_MONTHS.indexOf(filterEnd);
  const sliced = ALL_MONTHS.slice(si, ei + 1);

  if (filterBy === 'month') {
    return { labels: sliced.map(m => MONTH_LABELS[m]), indices: sliced.map((_, i) => si + i) };
  }
  // 분기별: 슬라이스된 월들을 분기로 묶기
  const qMap = {}; // 분기 키 → 원본 인덱스 배열
  sliced.forEach((m, i) => {
    const q = QUARTER_OF[m];
    if (!qMap[q]) qMap[q] = [];
    qMap[q].push(si + i);
  });
  const labels = Object.keys(qMap);
  return { labels, indices: null, qMap };
}

// 데이터 집계 (분기별은 합산)
function aggregateData(rawArr, slice) {
  if (filterBy === 'month') {
    return slice.indices.map(i => rawArr[i]);
  }
  return Object.values(slice.qMap).map(idxs => idxs.reduce((s, i) => s + rawArr[i], 0));
}

function syncZeroAxes(gmvData, cmData) {
  const nonZeroGmv = gmvData.filter(v => v !== 0);
  const gmvMax = (nonZeroGmv.length ? Math.max(...gmvData) : 1) * 1.1;
  const cmRawMax = Math.max(...cmData);
  const cmRawMin = Math.min(...cmData);
  const cmMax = cmRawMax > 0 ? cmRawMax * 1.1 : gmvMax * 0.05;
  const cmMin = cmRawMin < 0 ? cmRawMin * 1.1 : 0;
  if (cmMin >= 0) return { gmvMin: 0, gmvMax, cmMin: 0, cmMax };
  const frac = -cmMin / (cmMax - cmMin);
  const gmvMin = -(frac / (1 - frac)) * gmvMax;
  return { gmvMin, gmvMax, cmMin, cmMax };
}

function renderChart(id, gmvRaw, cmRaw, gmvColor) {
  // 기존 차트 제거
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }

  const slice = getFilteredSlice();
  const gmvData = aggregateData(gmvRaw, slice);
  const cmData  = aggregateData(cmRaw,  slice);
  const labels  = slice.labels;

  const axes = syncZeroAxes(gmvData, cmData);
  chartInstances[id] = new Chart(document.getElementById(id), {
    data: {
      labels,
      datasets: [
        {
          type: 'bar', label: 'GMV (만원)', data: gmvData,
          backgroundColor: gmvColor, borderWidth: 0,
          yAxisID: 'yGMV', order: 2, datalabels: { display: false }
        },
        {
          type: 'bar', label: 'CM (만원)', data: cmData,
          backgroundColor: cmData.map(v => v >= 0 ? 'rgba(99,120,220,0.85)' : 'rgba(99,120,220,0.7)'),
          borderColor: cmData.map(v => v >= 0 ? 'rgba(80,100,200,0.9)' : 'rgba(70,90,200,0.9)'),
          borderWidth: 1, yAxisID: 'yCM', order: 1,
          datalabels: {
            display: ctx => cmData[ctx.dataIndex] < 0,
            formatter: () => '(−)',
            color: 'rgb(220,38,38)',
            font: { size: 9, weight: 'bold' },
            anchor: 'end', align: 'bottom', offset: 1
          }
        }
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top', labels: { font: { size: 10 }, boxWidth: 10, padding: 6 } },
        tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()}만원` } }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 9 } } },
        yGMV: {
          type: 'linear', position: 'left', min: axes.gmvMin, max: axes.gmvMax,
          grid: { color: '#f0f0f0' },
          ticks: { font: { size: 9 }, callback: v => v === 0 ? '0' : (v/10000).toFixed(1)+'억' },
          title: { display: true, text: 'GMV', font: { size: 9 }, color: '#aaa' }
        },
        yCM: {
          type: 'linear', position: 'right', min: axes.cmMin, max: axes.cmMax,
          grid: { drawOnChartArea: false },
          ticks: { font: { size: 9 }, callback: v => v === 0 ? '0' : v.toLocaleString() },
          title: { display: true, text: 'CM (만원)', font: { size: 9 }, color: '#aaa' }
        }
      }
    }
  });
}

// ── 섹션 생성 ─────────────────────────────────────────────────
const contentEl = document.getElementById('content');
cities.forEach(city => {
  const section = document.createElement('div');
  section.className = 'city-section';
  section.id = city.id;

  const title = document.createElement('div');
  title.className = 'city-title';
  title.style.background = city.bgColor;
  title.textContent = city.name;
  section.appendChild(title);

  const grid = document.createElement('div');
  grid.className = 'grid2';
  city.cats.forEach(cat => {
    const wrap = document.createElement('div');
    wrap.className = 'chart-wrap';
    wrap.innerHTML = `<div class="chart-title">${cat.name}</div><div class="chart-sub">GMV 좌축 | CM 우축</div><canvas id="${cat.id}"></canvas>`;
    grid.appendChild(wrap);
  });

  section.appendChild(grid);
  contentEl.appendChild(section);
});

// ── 현재 활성 도시 추적 ────────────────────────────────────────
let activeCityId = cities[0].id;

// ── 도시 전환 ─────────────────────────────────────────────────
function showCity(cityId) {
  activeCityId = cityId;
  document.querySelectorAll('.city-section').forEach(s => s.classList.remove('visible'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));

  const section = document.getElementById(cityId);
  section.classList.add('visible');
  document.querySelector(`.nav-tab[data-city="${cityId}"]`).classList.add('active');

  const city = cities.find(c => c.id === cityId);
  city.cats.forEach(cat => renderChart(cat.id, cat.gmv, cat.cm, city.color));
}

// ── 필터 적용 ─────────────────────────────────────────────────
function applyFilter() {
  const si = ALL_MONTHS.indexOf(filterStart);
  const ei = ALL_MONTHS.indexOf(filterEnd);
  if (si > ei) { alert('종료월이 시작월보다 앞설 수 없습니다.'); return; }
  document.getElementById('filterInfo').textContent =
    `${MONTH_LABELS[filterStart]} ~ ${MONTH_LABELS[filterEnd]} / ${filterBy === 'month' ? '월별' : '분기별'}`;
  showCity(activeCityId);
}

// ── 필터 UI 초기화 ────────────────────────────────────────────
const selStart = document.getElementById('selStart');
const selEnd   = document.getElementById('selEnd');
ALL_MONTHS.forEach(m => {
  selStart.innerHTML += `<option value="${m}">${MONTH_LABELS[m]}</option>`;
  selEnd.innerHTML   += `<option value="${m}">${MONTH_LABELS[m]}</option>`;
});
selEnd.value = ALL_MONTHS[ALL_MONTHS.length - 1]; // 기본값: 마지막 월

selStart.addEventListener('change', () => { filterStart = selStart.value; });
selEnd.addEventListener('change',   () => { filterEnd   = selEnd.value; });

document.querySelectorAll('.dateby-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.dateby-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterBy = btn.dataset.by;
  });
});

document.getElementById('applyBtn').addEventListener('click', applyFilter);

// ── 네비게이션 생성 ───────────────────────────────────────────
const navEl = document.getElementById('navTabs');
cities.forEach(city => {
  const a = document.createElement('a');
  a.className = 'nav-tab';
  a.dataset.city = city.id;
  a.textContent = city.name;
  a.style.background = city.navColor;
  a.addEventListener('click', e => { e.preventDefault(); showCity(city.id); });
  navEl.appendChild(a);
});

// ── 초기 렌더 ─────────────────────────────────────────────────
document.getElementById('filterInfo').textContent =
  `${MONTH_LABELS[filterStart]} ~ ${MONTH_LABELS[filterEnd]} / 월별`;
showCity(cities[0].id);
</script>
