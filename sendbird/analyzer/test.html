<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sendbird Analyzer — Unit Tests</title>
  <style>
    body { font-family: monospace; background: #1a1a1a; color: #d4d4d4; padding: 24px; margin: 0; }
    h1 { color: #a8d8ea; font-size: 1.1rem; margin-bottom: 4px; }
    h2 { color: #888; font-size: 0.85rem; font-weight: normal; margin-top: 0; margin-bottom: 20px; }
    pre { background: #2d2d2d; padding: 16px; border-radius: 6px; white-space: pre-wrap; line-height: 1.7; font-size: 0.88rem; }
    .summary { margin-top: 16px; padding: 10px 16px; border-radius: 6px; font-weight: bold; }
    .all-pass { background: #1a3a1a; color: #6fcf7a; }
    .has-fail  { background: #3a1a1a; color: #f07070; }
  </style>
</head>
<body>
  <h1>Sendbird Analyzer — Unit Tests</h1>
  <h2>analyzer.js: parseAdmm / classifyChannel</h2>
  <pre id="out"></pre>
  <div id="summary" class="summary"></div>

  <script src="analyzer.js"></script>
  <script>
    // ── 테스트 유틸 ──────────────────────────────────────────────────
    window._analyzerUserId = 'P151883';

    let pass = 0, fail = 0;
    const lines = [];

    function out(line) { lines.push(line); }

    function assert(label, actual, expected) {
      const ok = JSON.stringify(actual) === JSON.stringify(expected);
      out((ok ? '✅' : '❌') + ' ' + label + (ok ? '' : '\n   got: ' + JSON.stringify(actual) + '\n   exp: ' + JSON.stringify(expected)));
      ok ? pass++ : fail++;
    }

    // ── 픽스처 헬퍼 ─────────────────────────────────────────────────
    function makeAdmmMsg(overrides = {}) {
      const base = {
        message_event_type: 'RESERVATION_STATUS_CHANGE',
        reservation_status: 'CONFIRM',
        message: {
          targetContents: [
            {
              sendbirdUserId: 'P151883',
              content: [
                {
                  reservationInfoList: [
                    { name: '예약번호', value: 'RES-001' },
                    { name: '여행 출발일', value: '2026-05-10' },
                  ]
                }
              ]
            }
          ]
        }
      };

      // 깊은 병합 없이 reservation_status 등 최상위 필드만 오버라이드
      const merged = Object.assign({}, base, overrides);
      return {
        data: JSON.stringify(merged),
        created_at: 1700000000000,
      };
    }

    function makeAdmmMsgCancel() {
      const d = {
        message_event_type: 'RESERVATION_STATUS_CHANGE',
        reservation_status: 'CANCEL',
        message: {
          targetContents: [
            {
              sendbirdUserId: 'P151883',
              content: [
                {
                  reservationInfoList: [
                    { name: '예약번호',    value: 'RES-001' },
                    { name: '여행 출발일', value: '2026-05-10' },
                    { name: '취소사유',    value: '고객 변심' },
                  ]
                }
              ]
            }
          ]
        }
      };
      return { data: JSON.stringify(d), created_at: 1700001000000 };
    }

    // ── 1. parseAdmm — CONFIRM 상태 ─────────────────────────────────
    out('\n─── parseAdmm ───────────────────────────────────────');

    const confirmMsg = makeAdmmMsg({ reservation_status: 'CONFIRM' });
    const confirmResult = parseAdmm(confirmMsg);

    assert(
      'CONFIRM: status === "CONFIRM"',
      confirmResult?.status,
      'CONFIRM'
    );
    assert(
      'CONFIRM: reservationNo 추출',
      confirmResult?.reservationNo,
      'RES-001'
    );
    assert(
      'CONFIRM: travelDate 추출',
      confirmResult?.travelDate,
      '2026-05-10'
    );
    assert(
      'CONFIRM: cancelReason === null',
      confirmResult?.cancelReason,
      null
    );

    // ── 2. parseAdmm — CANCEL + 취소사유 ────────────────────────────
    const cancelMsg = makeAdmmMsgCancel();
    const cancelResult = parseAdmm(cancelMsg);

    assert(
      'CANCEL: status === "CANCEL"',
      cancelResult?.status,
      'CANCEL'
    );
    assert(
      'CANCEL: cancelReason 추출',
      cancelResult?.cancelReason,
      '고객 변심'
    );

    // ── 3. parseAdmm — MEMBER_LEFT (비예약 이벤트) → null ───────────
    const memberLeftMsg = {
      data: JSON.stringify({ message_event_type: 'MEMBER_LEFT' }),
      created_at: 1700002000000,
    };
    assert(
      'MEMBER_LEFT → null',
      parseAdmm(memberLeftMsg),
      null
    );

    // ── 4. parseAdmm — 잘못된 JSON → null ───────────────────────────
    const badJsonMsg = { data: '{ not valid json', created_at: 1700003000000 };
    assert(
      '잘못된 JSON → null',
      parseAdmm(badJsonMsg),
      null
    );

    // ── 5. classifyChannel — CONFIRM → CANCEL (isPostConfirmCancel) ──
    out('\n─── classifyChannel ─────────────────────────────────');

    const events = [
      {
        status: 'CONFIRM',
        cancelReason: null,
        reservationNo: 'RES-001',
        travelDate: '2026-05-10',
        createdAt: 1700000000000,
      },
      {
        status: 'CANCEL',
        cancelReason: '고객 변심',
        reservationNo: 'RES-001',
        travelDate: '2026-05-10',
        createdAt: 1700001000000,
      },
    ];

    const channelResult = classifyChannel(events);

    assert(
      'CONFIRM→CANCEL: reservations.length === 1',
      channelResult.reservations.length,
      1
    );
    assert(
      'CONFIRM→CANCEL: finalStatus === "CANCEL"',
      channelResult.reservations[0]?.finalStatus,
      'CANCEL'
    );
    assert(
      'CONFIRM→CANCEL: isPostConfirmCancel === true',
      channelResult.reservations[0]?.isPostConfirmCancel,
      true
    );
    assert(
      'CONFIRM→CANCEL: cancelReason 일치',
      channelResult.reservations[0]?.cancelReason,
      '고객 변심'
    );

    // ── 6. classifyChannel — 빈 배열 ────────────────────────────────
    const emptyResult = classifyChannel([]);

    assert(
      '빈 배열: finalStatus === "NO_RESERVATION"',
      emptyResult.finalStatus,
      'NO_RESERVATION'
    );
    assert(
      '빈 배열: reservations.length === 0',
      emptyResult.reservations.length,
      0
    );

    // ── Task 3 테스트 ───────────────────────────────────────────

    // aggregateStats 테스트용 mock 채널
    const admm_confirm = makeAdmmMsg({ reservation_status: 'CONFIRM' });
    const mockChannels = [{
      members: [{ user_id: 'P151883', nickname: '하루하루투어' }],
      name: '나오시마 워킹투어',
      messages: [
        { type: 'MSG', created_at: 1000, user: { user_id: 'cust1' }, message: '문의드려요' },
        { type: 'MSG', created_at: 61000, user: { user_id: 'P151883' }, message: '안녕하세요! [안내] 드립니다' },
        { type: 'MSG', created_at: 120000, user: { user_id: 'cust1' }, message: '감사해요' },
      ],
      admmEvents: [parseAdmm(admm_confirm)].filter(Boolean),
    }];

    const stats = aggregateStats(mockChannels, 'P151883');
    assert('aggregateStats: 파트너명 추출', stats.partnerName, '하루하루투어');
    assert('aggregateStats: confirm 1건', stats.confirm, 1);
    assert('aggregateStats: 평균응답 1분', stats.avgResponseMinutes, 1);
    assert('aggregateStats: 사전안내 1채널', stats.preNotice, 1);
    assert('aggregateStats: 미답변 0건 (CONFIRM 채널은 미답변 아님)', stats.unanswered, 0);

    // 미답변 테스트: WAIT_CONFIRM 채널에서 마지막 메시지가 고객
    const admm_wait = {
      type: 'ADMM', created_at: 500,
      data: JSON.stringify({
        message_event_type: 'RESERVATION_STATUS_CHANGE',
        reservation_status: 'WAIT_CONFIRM',
        message: { targetContents: [{ sendbirdUserId: 'P151883', content: [{ reservationInfoList: [
          { name: '예약번호', value: 'EXP-999' }
        ]}]}]}
      })
    };
    const mockWaitCh = [{
      members: [{ user_id: 'P151883', nickname: '하루하루투어' }],
      name: '구마모토 투어',
      messages: [
        { type: 'MSG', created_at: 1000, user: { user_id: 'cust2' }, message: '예약 가능한가요?' },
      ],
      admmEvents: [parseAdmm(admm_wait)].filter(Boolean),
    }];
    const statsWait = aggregateStats(mockWaitCh, 'P151883');
    assert('aggregateStats: WAIT_CONFIRM에 마지막 고객 메시지 = 미답변 1건', statsWait.unanswered, 1);

    // 대기 명단 언급 테스트
    const mockWaitlistCh = [{
      members: [], name: '테스트', messages: [
        { type: 'MSG', created_at: 1000, user: { user_id: 'P151883' }, message: '현재 대기 명단에 올려드리겠습니다' },
      ], admmEvents: []
    }];
    const statsWl = aggregateStats(mockWaitlistCh, 'P151883');
    assert('aggregateStats: 대기 언급 채널 1건', statsWl.waitlistCount, 1);

    // detectEvents 테스트
    const mockChWithNoshow = [{
      members: [], name: '노쇼 테스트',
      messages: [{ type: 'MSG', created_at: 5000, user: { user_id: 'P151883' }, message: '가이드 노쇼로 전액 보상 드립니다' }],
      admmEvents: []
    }];
    const evts = detectEvents(mockChWithNoshow, 'P151883');
    assert('detectEvents: 노쇼 감지', evts[0]?.type, 'noshow');

    const mockChWithGuide = [{
      members: [], name: '가이드 교체',
      messages: [{ type: 'MSG', created_at: 6000, user: { user_id: 'P151883' }, message: '가이드 교체 진행해드릴게요' }],
      admmEvents: []
    }];
    const evts2 = detectEvents(mockChWithGuide, 'P151883');
    assert('detectEvents: 가이드 교체 감지', evts2[0]?.type, 'guide');

    const mockChWithDelay = [{
      members: [], name: '지연',
      messages: [{ type: 'MSG', created_at: 7000, user: { user_id: 'P151883' }, message: '오픈 지연으로 대기 중입니다' }],
      admmEvents: []
    }];
    const evts3 = detectEvents(mockChWithDelay, 'P151883');
    assert('detectEvents: 일정 지연 감지', evts3[0]?.type, 'delay');

    // ── 출력 ────────────────────────────────────────────────────────
    document.getElementById('out').textContent = lines.join('\n');

    const total = pass + fail;
    const summaryEl = document.getElementById('summary');
    summaryEl.textContent = `${pass} / ${total} passed` + (fail ? ` — ${fail} FAILED` : ' — all green!');
    summaryEl.className = 'summary ' + (fail ? 'has-fail' : 'all-pass');
  </script>
</body>
</html>
