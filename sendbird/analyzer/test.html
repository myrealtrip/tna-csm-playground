<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sendbird Analyzer вҖ” Unit Tests</title>
  <style>
    body { font-family: monospace; background: #1a1a1a; color: #d4d4d4; padding: 24px; margin: 0; }
    h1 { color: #a8d8ea; font-size: 1.1rem; margin-bottom: 4px; }
    h2 { color: #888; font-size: 0.85rem; font-weight: normal; margin-top: 0; margin-bottom: 20px; }
    pre { background: #2d2d2d; padding: 16px; border-radius: 6px; white-space: pre-wrap; line-height: 1.7; font-size: 0.88rem; }
    .summary { margin-top: 16px; padding: 10px 16px; border-radius: 6px; font-weight: bold; }
    .all-pass { background: #1a3a1a; color: #6fcf7a; }
    .has-fail  { background: #3a1a1a; color: #f07070; }
  </style>
</head>
<body>
  <h1>Sendbird Analyzer вҖ” Unit Tests</h1>
  <h2>analyzer.js: parseAdmm / classifyChannel</h2>
  <pre id="out"></pre>
  <div id="summary" class="summary"></div>

  <script src="analyzer.js"></script>
  <script>
    // в”Җв”Җ н…ҢмҠӨнҠё мң нӢё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    window._analyzerUserId = 'P151883';

    let pass = 0, fail = 0;
    const lines = [];

    function out(line) { lines.push(line); }

    function assert(label, actual, expected) {
      const ok = JSON.stringify(actual) === JSON.stringify(expected);
      out((ok ? 'вң…' : 'вқҢ') + ' ' + label + (ok ? '' : '\n   got: ' + JSON.stringify(actual) + '\n   exp: ' + JSON.stringify(expected)));
      ok ? pass++ : fail++;
    }

    // в”Җв”Җ н”ҪмҠӨмІҳ н—¬нҚј в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    function makeAdmmMsg(overrides = {}) {
      const base = {
        message_event_type: 'RESERVATION_STATUS_CHANGE',
        reservation_status: 'CONFIRM',
        message: {
          targetContents: [
            {
              sendbirdUserId: 'P151883',
              content: [
                {
                  reservationInfoList: [
                    { name: 'мҳҲм•ҪлІҲнҳё', value: 'RES-001' },
                    { name: 'м—¬н–ү м¶ңл°ңмқј', value: '2026-05-10' },
                  ]
                }
              ]
            }
          ]
        }
      };

      // к№ҠмқҖ лі‘н•© м—Ҷмқҙ reservation_status л“ұ мөңмғҒмң„ н•„л“ңл§Ң мҳӨлІ„лқјмқҙл“ң
      const merged = Object.assign({}, base, overrides);
      return {
        data: JSON.stringify(merged),
        created_at: 1700000000000,
      };
    }

    function makeAdmmMsgCancel() {
      const d = {
        message_event_type: 'RESERVATION_STATUS_CHANGE',
        reservation_status: 'CANCEL',
        message: {
          targetContents: [
            {
              sendbirdUserId: 'P151883',
              content: [
                {
                  reservationInfoList: [
                    { name: 'мҳҲм•ҪлІҲнҳё',    value: 'RES-001' },
                    { name: 'м—¬н–ү м¶ңл°ңмқј', value: '2026-05-10' },
                    { name: 'м·ЁмҶҢмӮ¬мң ',    value: 'кі к°қ ліҖмӢ¬' },
                  ]
                }
              ]
            }
          ]
        }
      };
      return { data: JSON.stringify(d), created_at: 1700001000000 };
    }

    // в”Җв”Җ 1. parseAdmm вҖ” CONFIRM мғҒнғң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    out('\nв”Җв”Җв”Җ parseAdmm в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ');

    const confirmMsg = makeAdmmMsg({ reservation_status: 'CONFIRM' });
    const confirmResult = parseAdmm(confirmMsg);

    assert(
      'CONFIRM: status === "CONFIRM"',
      confirmResult?.status,
      'CONFIRM'
    );
    assert(
      'CONFIRM: reservationNo м¶”м¶ң',
      confirmResult?.reservationNo,
      'RES-001'
    );
    assert(
      'CONFIRM: travelDate м¶”м¶ң',
      confirmResult?.travelDate,
      '2026-05-10'
    );
    assert(
      'CONFIRM: cancelReason === null',
      confirmResult?.cancelReason,
      null
    );

    // в”Җв”Җ 2. parseAdmm вҖ” CANCEL + м·ЁмҶҢмӮ¬мң  в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const cancelMsg = makeAdmmMsgCancel();
    const cancelResult = parseAdmm(cancelMsg);

    assert(
      'CANCEL: status === "CANCEL"',
      cancelResult?.status,
      'CANCEL'
    );
    assert(
      'CANCEL: cancelReason м¶”м¶ң',
      cancelResult?.cancelReason,
      'кі к°қ ліҖмӢ¬'
    );

    // в”Җв”Җ 3. parseAdmm вҖ” MEMBER_LEFT (л№„мҳҲм•Ҫ мқҙлІӨнҠё) вҶ’ null в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const memberLeftMsg = {
      data: JSON.stringify({ message_event_type: 'MEMBER_LEFT' }),
      created_at: 1700002000000,
    };
    assert(
      'MEMBER_LEFT вҶ’ null',
      parseAdmm(memberLeftMsg),
      null
    );

    // в”Җв”Җ 4. parseAdmm вҖ” мһҳлӘ»лҗң JSON вҶ’ null в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const badJsonMsg = { data: '{ not valid json', created_at: 1700003000000 };
    assert(
      'мһҳлӘ»лҗң JSON вҶ’ null',
      parseAdmm(badJsonMsg),
      null
    );

    // в”Җв”Җ 5. classifyChannel вҖ” CONFIRM вҶ’ CANCEL (isPostConfirmCancel) в”Җв”Җ
    out('\nв”Җв”Җв”Җ classifyChannel в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ');

    const events = [
      {
        status: 'CONFIRM',
        cancelReason: null,
        reservationNo: 'RES-001',
        travelDate: '2026-05-10',
        createdAt: 1700000000000,
      },
      {
        status: 'CANCEL',
        cancelReason: 'кі к°қ ліҖмӢ¬',
        reservationNo: 'RES-001',
        travelDate: '2026-05-10',
        createdAt: 1700001000000,
      },
    ];

    const channelResult = classifyChannel(events);

    assert(
      'CONFIRMвҶ’CANCEL: reservations.length === 1',
      channelResult.reservations.length,
      1
    );
    assert(
      'CONFIRMвҶ’CANCEL: finalStatus === "CANCEL"',
      channelResult.reservations[0]?.finalStatus,
      'CANCEL'
    );
    assert(
      'CONFIRMвҶ’CANCEL: isPostConfirmCancel === true',
      channelResult.reservations[0]?.isPostConfirmCancel,
      true
    );
    assert(
      'CONFIRMвҶ’CANCEL: cancelReason мқјм№ҳ',
      channelResult.reservations[0]?.cancelReason,
      'кі к°қ ліҖмӢ¬'
    );

    // в”Җв”Җ 6. classifyChannel вҖ” л№Ҳ л°°м—ҙ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const emptyResult = classifyChannel([]);

    assert(
      'л№Ҳ л°°м—ҙ: finalStatus === "NO_RESERVATION"',
      emptyResult.finalStatus,
      'NO_RESERVATION'
    );
    assert(
      'л№Ҳ л°°м—ҙ: reservations.length === 0',
      emptyResult.reservations.length,
      0
    );

    // в”Җв”Җ м¶ңл Ҙ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    document.getElementById('out').textContent = lines.join('\n');

    const total = pass + fail;
    const summaryEl = document.getElementById('summary');
    summaryEl.textContent = `${pass} / ${total} passed` + (fail ? ` вҖ” ${fail} FAILED` : ' вҖ” all green!');
    summaryEl.className = 'summary ' + (fail ? 'has-fail' : 'all-pass');
  </script>
</body>
</html>
