<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRT PDP 섹션 빌더</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { box-sizing: border-box; }
  body { font-family: "Pretendard Variable", Pretendard, -apple-system, sans-serif; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
  .keep-all { word-break: keep-all; word-wrap: break-word; }
  .cat-tab.active { color: #51ABF3; border-bottom: 2px solid #51ABF3; }
  .sub-btn.active { background: #51ABF3; color: #fff; border-color: #51ABF3; }

  /* Section cards in library */
  .sec-card { transition: all 0.12s; user-select: none; cursor: grab; border-radius: 9px; border: 1px solid #E5E7EB; background: #fff; padding: 7px 8px; display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .sec-card:active { cursor: grabbing; }
  .sec-card.in-canvas { opacity: 0.32; cursor: not-allowed; pointer-events: none; }
  .sec-card:not(.in-canvas):hover { border-color: #51ABF3; box-shadow: 0 1px 4px rgba(81,171,243,0.2); }

  /* Active items */
  .active-item { border-radius: 9px; border: 1px solid #BFDFFF; background: #EEF6FF; padding: 7px 8px; display: flex; align-items: center; gap: 6px; cursor: grab; user-select: none; transition: all 0.12s; margin-bottom: 4px; }
  .active-item:active { cursor: grabbing; }
  .active-item.ghost { opacity: 0.3; }

  /* Canvas section */
  .canvas-sec { position: relative; background: white; }
  .canvas-bar { display: flex; align-items: center; gap: 5px; padding: 5px 8px; background: rgba(255,255,255,0.97); border-bottom: 1px solid #E5E7EB; position: sticky; top: 0; z-index: 20; }
  .canvas-sec.active .canvas-bar { background: rgba(81,171,243,0.08); border-color: #51ABF3; }
  .canvas-sec.active { outline: 2px solid #51ABF3; outline-offset: -2px; }
  .canvas-sec.cdrag { opacity: 0.3; }
  .drag-handle { cursor: grab; color: #ccc; font-size: 14px; line-height: 1; }

  /* Insert markers */
  .ins-mark { height: 3px; background: #51ABF3; border-radius: 2px; pointer-events: none; box-shadow: 0 0 6px rgba(81,171,243,0.5); position: relative; }
  .ins-mark::before { content: ''; display: block; width: 8px; height: 8px; background: #51ABF3; border-radius: 50%; position: absolute; top: -2.5px; left: -4px; }

  /* Canvas empty */
  .canvas-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; color: #9CA3AF; border: 2px dashed #E5E7EB; border-radius: 16px; margin: 20px; transition: all 0.15s; }
  .canvas-empty.dov { border-color: #51ABF3; background: #EEF6FF; color: #51ABF3; }

  /* Panel drop highlights */
  .dov-active { background: #EFF6FF !important; }
  .dov-lib { background: #FFF5F5 !important; }

  /* Right panel */
  #right-panel { transition: width 0.3s ease; overflow: hidden; }
  #right-panel.open { width: 320px; }

  /* Type badges */
  .type-HERO { background: #EEF6FF; color: #1D6FAA; }
  .type-표 { background: #ECFDF5; color: #065F46; }
  .type-이미지 { background: #FFF7ED; color: #9A3412; }
  .type-정보 { background: #F5F3FF; color: #5B21B6; }
  .type-FAQ { background: #FFFBEB; color: #92400E; }
  .type-공통 { background: #F9FAFB; color: #374151; }

  /* Timeline / FAQ / Day tabs */
  .timeline-line { position: absolute; left: 19px; top: 10px; bottom: -20px; width: 2px; background: #E5E7EB; z-index: 0; }
  .last-item .timeline-line { display: none; }
  .faq-answer { display: none; }
  .faq-item.open .faq-answer { display: block; }
  .faq-item.open .faq-chevron { transform: rotate(180deg); }
  .faq-chevron { transition: transform 0.2s; }
  .day-tab.active { background: #51ABF3; color: #fff; border-color: #51ABF3; }
  .day-content { display: none; }
  .day-content.active { display: block; }
  .sec-div { height: 8px; background: #F2F3F5; }
  .cat-gh { font-size: 10px; font-weight: 700; color: #9CA3AF; padding: 8px 4px 3px; letter-spacing: 0.04em; border-bottom: 1px solid #F3F4F6; margin-bottom: 4px; }
</style>
</head>
<body class="bg-[#F2F3F5] h-screen flex flex-col overflow-hidden">

<header class="bg-white border-b border-gray-100 shadow-sm shrink-0 z-40">
  <div class="flex overflow-x-auto px-4" style="scrollbar-width:none">
    <button class="cat-tab active shrink-0 px-4 py-2.5 text-sm font-bold text-gray-400 border-b-2 border-transparent whitespace-nowrap" data-cat="ticket">① 티켓·이용권</button>
    <button class="cat-tab shrink-0 px-4 py-2.5 text-sm font-bold text-gray-400 border-b-2 border-transparent whitespace-nowrap" data-cat="tour">② 가이드 투어</button>
    <button class="cat-tab shrink-0 px-4 py-2.5 text-sm font-bold text-gray-400 border-b-2 border-transparent whitespace-nowrap" data-cat="golf">③ 골프·특수투어</button>
    <button class="cat-tab shrink-0 px-4 py-2.5 text-sm font-bold text-gray-400 border-b-2 border-transparent whitespace-nowrap" data-cat="semi">④ 세미패키지</button>
  </div>
  <div id="sub-row" class="flex gap-2 px-4 py-2 bg-gray-50">
    <button class="sub-btn active shrink-0 text-xs font-bold px-3 py-1.5 rounded-full border border-gray-200 text-gray-500 whitespace-nowrap transition" data-sub="ticket-1a">1A 테마파크</button>
    <button class="sub-btn shrink-0 text-xs font-bold px-3 py-1.5 rounded-full border border-gray-200 text-gray-500 whitespace-nowrap transition" data-sub="ticket-1b">1B 교통 티켓</button>
    <button class="sub-btn shrink-0 text-xs font-bold px-3 py-1.5 rounded-full border border-gray-200 text-gray-500 whitespace-nowrap transition" data-sub="ticket-1c">1C 시티패스</button>
    <button class="sub-btn shrink-0 text-xs font-bold px-3 py-1.5 rounded-full border border-gray-200 text-gray-500 whitespace-nowrap transition" data-sub="ticket-1d">1D 유람선·공연</button>
    <button class="sub-btn shrink-0 text-xs font-bold px-3 py-1.5 rounded-full border border-gray-200 text-gray-500 whitespace-nowrap transition" data-sub="snap">1E 스냅·스파·미식</button>
  </div>
</header>

<main class="flex flex-1 overflow-hidden">

  <!-- Panel 1: 전체 섹션 라이브러리 -->
  <div class="w-[280px] shrink-0 bg-white border-r border-gray-200 flex flex-col overflow-hidden">
    <div class="px-3 py-2.5 bg-gray-50 border-b border-gray-200 shrink-0">
      <p class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">전체 섹션 라이브러리</p>
      <p class="text-[10px] text-gray-400 mt-0.5">클릭 추가 · 드래그로 위치 지정</p>
    </div>
    <div id="lib-list" class="flex-1 overflow-y-auto p-2"></div>
  </div>

  <!-- Panel 2: 현재 적용된 섹션 -->
  <div class="w-[280px] shrink-0 bg-white border-r border-gray-200 flex flex-col overflow-hidden">
    <div class="px-3 py-2.5 bg-blue-50 border-b border-blue-100 shrink-0 flex items-center gap-2">
      <p class="text-[11px] font-bold text-[#1D6FAA] uppercase tracking-wider">현재 적용된 섹션</p>
      <span id="active-count" class="ml-auto text-[10px] font-bold bg-[#51ABF3] text-white px-2 py-0.5 rounded-full">0</span>
    </div>
    <div id="active-list" class="flex-1 overflow-y-auto p-2 min-h-0"></div>
  </div>

  <!-- Center: PDP Canvas -->
  <div id="center" class="flex-1 overflow-y-auto bg-[#F2F3F5] py-3 px-3">
    <div id="mockup-container" class="w-full max-w-[430px] mx-auto rounded-2xl shadow-xl bg-white min-h-[200px]"></div>
  </div>

  <!-- Right: Info panel -->
  <div id="right-panel" class="w-0 bg-white border-l border-gray-100 overflow-y-auto shrink-0">
    <div class="w-[320px]">
      <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100 sticky top-0 bg-white z-10">
        <p class="text-sm font-bold text-[#1D2229]" id="panel-title">섹션 정보</p>
        <button onclick="closePanel()" class="text-gray-400 hover:text-gray-600 text-lg leading-none">×</button>
      </div>
      <div id="panel-content" class="p-4 space-y-4"></div>
    </div>
  </div>

</main>

  }
};

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let currentTab = 'ticket-1a';
let canvasItems = {}; // tabId → [{catId, secId}]
let dragState = null;

function initTab(tabId) {
  if (!canvasItems[tabId]) {
    const meta = SECTION_META[tabId];
    canvasItems[tabId] = meta ? meta.sections.map(s => ({ catId: tabId, secId: s.id })) : [];
  }
}
function getItems() { return canvasItems[currentTab] || []; }
function inCanvas(catId, secId) { return getItems().some(it => it.catId===catId && it.secId===secId); }

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function renderAll(tabId) {
  currentTab = tabId;
  initTab(tabId);
  renderLibrary();
  renderActive();
  renderCanvas();
  closePanel();
}

function renderLibrary() {
  let html = '';
  for (const [catId, meta] of Object.entries(SECTION_META)) {
    html += `<div class="cat-gh">${meta.label}</div>`;
    for (const sec of meta.sections) {
      const added = inCanvas(catId, sec.id);
      html += `<div class="sec-card ${added?'in-canvas':''}"
        draggable="${!added}"
        ondragstart="onLibDS(event,'${catId}','${sec.id}')"
        ondragend="onDE()"
        onclick="${added?'':'addToEnd(`'+catId+'`,`'+sec.id+'`)'}">
        <span style="width:18px;height:18px;border-radius:50%;background:#EEF6FF;color:#1D6FAA;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${sec.id}</span>
        <span style="font-size:11px;font-weight:500;color:#374151;flex:1;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${sec.title}</span>
        <span class="text-[9px] font-bold px-1 py-0.5 rounded type-${sec.type} shrink-0">${sec.type}</span>
        <span style="font-size:12px;flex-shrink:0;color:${added?'#86EFAC':'#51ABF3'};font-weight:700">${added?'✓':'+'}</span>
      </div>`;
    }
  }
  document.getElementById('lib-list').innerHTML = html;
}

function renderActive() {
  const items = getItems();
  document.getElementById('active-count').textContent = items.length;
  if (!items.length) {
    document.getElementById('active-list').innerHTML = '<div style="text-align:center;color:#9CA3AF;font-size:11px;padding:20px 8px;border:2px dashed #E5E7EB;border-radius:10px;margin:4px">라이브러리에서<br>드래그하여 추가</div>';
    return;
  }
  document.getElementById('active-list').innerHTML = items.map((item,i) => {
    const sec = SECTION_META[item.catId]?.sections.find(s=>s.id===item.secId);
    const catLabel = SECTION_META[item.catId]?.label || item.catId;
    return `<div class="active-item" data-idx="${i}" draggable="true"
      ondragstart="onActiveDS(event,${i})" ondragend="onDE()">
      <span style="cursor:grab;color:#bbb;font-size:12px;flex-shrink:0">⠿</span>
      <div style="flex:1;min-width:0">
        <p style="font-size:11px;font-weight:600;color:#1D2229;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${sec?.title||item.secId}</p>
        <p style="font-size:9px;color:#9CA3AF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${catLabel}</p>
      </div>
      <button onclick="event.stopPropagation();openPanel('${item.catId}||${item.secId}')" style="color:#bbb;font-size:10px;background:none;border:none;cursor:pointer;flex-shrink:0">▶</button>
      <button onclick="rmItem(${i})" style="color:#ccc;font-size:15px;line-height:1;background:none;border:none;cursor:pointer;flex-shrink:0">×</button>
    </div>`;
  }).join('');
}

function renderCanvas() {
  const container = document.getElementById('mockup-container');
  const items = getItems();
  if (!items.length) {
    container.innerHTML = '<div class="canvas-empty"><div style="font-size:2.5rem;margin-bottom:12px">📋</div><p style="font-size:14px;font-weight:700">섹션을 드래그하여 추가</p><p style="font-size:12px;margin-top:4px;color:#9CA3AF">왼쪽 패널에서 드래그하거나 클릭하세요</p></div>';
    return;
  }
  container.innerHTML = items.map((item,i) => {
    const sec = SECTION_META[item.catId]?.sections.find(s=>s.id===item.secId);
    const inner = SI[item.catId]?.[item.secId] || `<div style="padding:24px;text-align:center;color:#9CA3AF;font-size:13px">${sec?.title||item.secId}</div>`;
    return (i>0?'<div class="sec-div"></div>':'')+
    `<div class="canvas-sec" data-catid="${item.catId}" data-secid="${item.secId}" data-index="${i}"
      draggable="true" ondragstart="onCanvasDS(event,${i})" ondragend="onDE()"
      onclick="openPanel('${item.catId}||${item.secId}')" style="cursor:pointer">
      <div class="canvas-bar">
        <span class="drag-handle">⠿</span>
        <span style="width:18px;height:18px;border-radius:50%;background:#EEF6FF;color:#1D6FAA;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${item.secId}</span>
        <span style="font-size:11px;font-weight:500;color:#374151;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${sec?.title||item.secId}</span>
        ${sec?`<span class="text-[9px] font-bold px-1.5 py-0.5 rounded type-${sec.type} shrink-0">${sec.type}</span>`:''}
        <button onclick="event.stopPropagation();openPanel('${item.catId}||${item.secId}')" style="color:#ccc;font-size:11px;background:none;border:none;cursor:pointer">▶</button>
        <button onclick="event.stopPropagation();rmItem(${i})" style="color:#ccc;font-size:15px;line-height:1;background:none;border:none;cursor:pointer">×</button>
      </div>
      ${inner}
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════
// MUTATIONS
// ══════════════════════════════════════════════════════
function addToEnd(catId, secId) {
  if (!inCanvas(catId,secId)) { canvasItems[currentTab].push({catId,secId}); rerender(); }
}
function rmItem(idx) { canvasItems[currentTab].splice(idx,1); rerender(); }
function insertAt(catId, secId, idx) {
  if (inCanvas(catId,secId)) return;
  canvasItems[currentTab].splice(idx,0,{catId,secId}); rerender();
}
function moveTo(fromIdx, toIdx) {
  const items = canvasItems[currentTab];
  const [m] = items.splice(fromIdx,1);
  const ni = toIdx > fromIdx ? toIdx-1 : toIdx;
  items.splice(Math.max(0,ni),0,m); rerender();
}
function rerender() { renderLibrary(); renderActive(); renderCanvas(); }

// ══════════════════════════════════════════════════════
// DRAG & DROP
// ══════════════════════════════════════════════════════
let cMark=null, aMark=null;

function onLibDS(e,catId,secId) { dragState={type:'lib',catId,secId}; e.dataTransfer.effectAllowed='copy'; e.stopPropagation(); }
function onActiveDS(e,fromIdx) {
  const it=getItems()[fromIdx]; dragState={type:'active',catId:it.catId,secId:it.secId,fromIndex:fromIdx};
  e.dataTransfer.effectAllowed='move'; e.stopPropagation();
  setTimeout(()=>{ document.querySelectorAll('.active-item')[fromIdx]?.classList.add('ghost'); document.querySelector(`.canvas-sec[data-catid="${it.catId}"][data-secid="${it.secId}"]`)?.classList.add('cdrag'); },0);
}
function onCanvasDS(e,fromIdx) {
  const it=getItems()[fromIdx]; dragState={type:'canvas',catId:it.catId,secId:it.secId,fromIndex:fromIdx};
  e.dataTransfer.effectAllowed='move'; e.stopPropagation();
  setTimeout(()=>{ e.target.closest?.('.canvas-sec')?.classList.add('cdrag'); },0);
}
function onDE() {
  dragState=null;
  document.querySelectorAll('.canvas-sec').forEach(el=>el.classList.remove('cdrag'));
  document.querySelectorAll('.active-item').forEach(el=>el.classList.remove('ghost'));
  rmCMark(); rmAMark();
  document.getElementById('lib-list').classList.remove('dov-lib');
  document.getElementById('active-list').classList.remove('dov-active');
}

// Canvas drop zone — init ONCE
function initCanvasDZ() {
  const c = document.getElementById('mockup-container');
  c.addEventListener('dragover', e => {
    if (!dragState) return; e.preventDefault();
    showCMark(getCI(e)); c.querySelector('.canvas-empty')?.classList.add('dov');
  });
  c.addEventListener('dragleave', e => { if (!c.contains(e.relatedTarget)) { rmCMark(); c.querySelector('.canvas-empty')?.classList.remove('dov'); } });
  c.addEventListener('drop', e => {
    e.preventDefault(); if (!dragState) return;
    const idx=getCI(e); rmCMark(); c.querySelector('.canvas-empty')?.classList.remove('dov');
    const {type,catId,secId,fromIndex}=dragState; dragState=null;
    if (type==='lib') insertAt(catId,secId,idx);
    else moveTo(fromIndex,idx);
  });
}

// Active list drop zone — init ONCE
function initActiveDZ() {
  const al = document.getElementById('active-list');
  al.addEventListener('dragover', e => {
    if (!dragState||(dragState.type!=='lib'&&dragState.type!=='active')) return;
    e.preventDefault(); al.classList.add('dov-active'); showAMark(getAI(e));
  });
  al.addEventListener('dragleave', e => { if (!al.contains(e.relatedTarget)) { al.classList.remove('dov-active'); rmAMark(); } });
  al.addEventListener('drop', e => {
    e.preventDefault(); al.classList.remove('dov-active'); rmAMark();
    if (!dragState) return;
    const idx=getAI(e); const {type,catId,secId,fromIndex}=dragState; dragState=null;
    if (type==='lib') insertAt(catId,secId,idx); else moveTo(fromIndex,idx);
  });
}

// Library drop zone — drop active→lib removes it
function initLibDZ() {
  const ll = document.getElementById('lib-list');
  ll.addEventListener('dragover', e => { if (dragState?.type==='active') { e.preventDefault(); ll.classList.add('dov-lib'); } });
  ll.addEventListener('dragleave', e => { if (!ll.contains(e.relatedTarget)) ll.classList.remove('dov-lib'); });
  ll.addEventListener('drop', e => {
    e.preventDefault(); ll.classList.remove('dov-lib');
    if (dragState?.type==='active') { const idx=dragState.fromIndex; dragState=null; rmItem(idx); }
  });
}

// Index helpers
function getCI(e) {
  const ss=[...document.querySelectorAll('.canvas-sec')];
  for (let i=0;i<ss.length;i++) { if (e.clientY < ss[i].getBoundingClientRect().top+ss[i].getBoundingClientRect().height/2) return i; }
  return ss.length;
}
function getAI(e) {
  const aa=[...document.querySelectorAll('#active-list .active-item')];
  for (let i=0;i<aa.length;i++) { if (e.clientY < aa[i].getBoundingClientRect().top+aa[i].getBoundingClientRect().height/2) return i; }
  return aa.length;
}

// Marker helpers
function showCMark(idx) {
  if (!cMark) { cMark=document.createElement('div'); cMark.className='ins-mark'; }
  const ss=[...document.querySelectorAll('.canvas-sec')], c=document.getElementById('mockup-container');
  if (!ss.length) { c.appendChild(cMark); return; }
  if (idx===0) ss[0].before(cMark); else if (idx<ss.length) ss[idx].before(cMark); else c.appendChild(cMark);
}
function rmCMark() { cMark?.remove(); cMark=null; }
function showAMark(idx) {
  if (!aMark) { aMark=document.createElement('div'); aMark.style.cssText='height:3px;background:#51ABF3;border-radius:2px;pointer-events:none;box-shadow:0 0 4px rgba(81,171,243,0.5);margin:2px 0'; }
  const aa=[...document.querySelectorAll('#active-list .active-item')], al=document.getElementById('active-list');
  if (!aa.length) { al.appendChild(aMark); return; }
  if (idx===0) aa[0].before(aMark); else if (idx<aa.length) aa[idx].before(aMark); else aa[aa.length-1].after(aMark);
}
function rmAMark() { aMark?.remove(); aMark=null; }

// ══════════════════════════════════════════════════════
// RIGHT PANEL
// ══════════════════════════════════════════════════════
function openPanel(sid) {
  const p=sid.indexOf('||'); if (p===-1) return;
  const catId=sid.slice(0,p), secId=sid.slice(p+2);
  const sec=SECTION_META[catId]?.sections.find(s=>s.id===secId); if (!sec) return;
  document.getElementById('panel-title').textContent=`[${sec.id}] ${sec.title}`;
  document.getElementById('panel-content').innerHTML=`
    <div><span class="text-[11px] font-bold px-2 py-1 rounded type-${sec.type}">${sec.type}</span></div>
    <div class="bg-blue-50 rounded-xl p-4"><p class="text-[11px] font-bold text-blue-700 mb-2">❓ 왜 필요한가</p><p class="text-[13px] text-blue-900 leading-relaxed keep-all">${sec.why}</p></div>
    <div class="bg-gray-50 rounded-xl p-4"><p class="text-[11px] font-bold text-gray-500 mb-2">📐 이미지 스펙</p><p class="text-[13px] text-gray-700">${sec.imgSpec}</p></div>
    <div class="bg-green-50 rounded-xl p-4"><p class="text-[11px] font-bold text-green-700 mb-2">🗂 필요 에셋</p><p class="text-[13px] text-green-900">${sec.assets}</p></div>
    ${sec.guide?`<div class="bg-yellow-50 rounded-xl p-4"><p class="text-[11px] font-bold text-yellow-700 mb-2">✏️ 작성 가이드</p><p class="text-[13px] text-yellow-900 leading-relaxed keep-all">${sec.guide}</p></div>`:''}
  `;
  document.getElementById('right-panel').classList.add('open');
  document.querySelectorAll('.canvas-sec').forEach(w=>w.classList.remove('active'));
  const t=document.querySelector(`.canvas-sec[data-catid="${catId}"][data-secid="${secId}"]`);
  if (t) { t.classList.add('active'); t.scrollIntoView({behavior:'smooth',block:'center'}); }
}
function closePanel() {
  document.getElementById('right-panel').classList.remove('open');
  document.querySelectorAll('.canvas-sec').forEach(w=>w.classList.remove('active'));
}

// ══════════════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════════════
document.querySelectorAll('.cat-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const cat = btn.dataset.cat;
    if (cat==='ticket') { document.getElementById('sub-row').style.display='flex'; renderAll(document.querySelector('.sub-btn.active')?.dataset.sub||'ticket-1a'); }
    else { document.getElementById('sub-row').style.display='none'; renderAll(cat); }
  });
});
document.querySelectorAll('.sub-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sub-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); renderAll(btn.dataset.sub);
  });
});
function switchDay(btn,dayId) {
  document.querySelectorAll('.day-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.day-content').forEach(d=>d.classList.remove('active'));
  btn.classList.add('active'); document.getElementById(dayId)?.classList.add('active');
}

// Init
initCanvasDZ(); initActiveDZ(); initLibDZ();
renderAll('ticket-1a');
</script>
